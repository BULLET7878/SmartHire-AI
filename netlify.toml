[build]
  command = "cd frontend && npm install && npm run build && cd .. && rm -rf dist && mv frontend/dist dist"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_CLIENT_ID,VITE_GOOGLE_CLIENT_ID,NODE_ENV,PORT"