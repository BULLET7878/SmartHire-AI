services:
  # Backend Web Service
  - type: web
    name: smarthire-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        value: "mongodb+srv://rahuldhakarmm_db_user:Mrdhakad@cluster0.5dcjmvk.mongodb.net/?appName=Cluster0"
      - key: JWT_SECRET
        value: "supersecretkey_dev_only_12345"
      - key: GEMINI_API_KEY
        value: "AIzaSyDpb39No0Ycs_58usmttZeZVWHZFP3EC8w"
      - key: GOOGLE_CLIENT_ID
        value: "499580640899-7l4cgqiv9t5ea2rj17h76n9d7gk7agmf.apps.googleusercontent.com"
      - key: NODE_ENV
        value: "production"

  # Frontend Static Site
  - type: static
    name: smarthire-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: smarthire-backend
          type: web
          property: host
      - key: VITE_GOOGLE_CLIENT_ID
        value: "499580640899-7l4cgqiv9t5ea2rj17h76n9d7gk7agmf.apps.googleusercontent.com"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://smarthire-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
